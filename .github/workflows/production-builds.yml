name: Production Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    name: Linux artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            ffmpeg \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            protobuf-compiler \
            wget

          protoc --version
          ffmpeg -version

          curl -L -o "$RUNNER_TEMP/appimagetool" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool"

          echo "APPIMAGETOOL=$RUNNER_TEMP/appimagetool" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux Electron AppImages
        run: pnpm export:linux

      - name: Build Linux Tauri executable
        run: pnpm bundle:tauri:linux

      - name: Verify Tauri Linux executable links WebKitGTK
        run: |
          ldd dist/tauri-linux/*-linux-x64-tauri
          ldd dist/tauri-linux/*-linux-x64-tauri | grep 'libwebkit2gtk-4.1.so'

      - name: Build Linux Tauri AppImage
        run: pnpm bundle:tauri:appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: shindentoanilist-linux
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/electron-builder/*.AppImage
            dist/tauri-linux/*-linux-x64-tauri
            dist/tauri-appimage/*.AppImage

      - name: Attach Linux assets to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "No GitHub Release exists for $RELEASE_TAG yet; keeping workflow artifacts only."
            exit 0
          fi

          gh release upload "$RELEASE_TAG" \
            dist/*.AppImage \
            dist/electron-builder/*.AppImage \
            dist/tauri-linux/*-linux-x64-tauri \
            dist/tauri-appimage/*.AppImage \
            --clobber

  windows-native:
    name: Windows Tauri executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install protoc ffmpeg --no-progress -y

          protoc --version
          ffmpeg -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Windows executable
        run: pnpm bundle:tauri:windows

      - name: Upload Tauri Windows native executable
        uses: actions/upload-artifact@v6
        with:
          name: shindentoanilist-windows-tauri
          if-no-files-found: error
          path: dist/tauri-windows/*.exe

      - name: Attach Windows asset to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "No GitHub Release exists for $RELEASE_TAG yet; keeping workflow artifacts only."
            exit 0
          fi

          gh release upload "$RELEASE_TAG" dist/tauri-windows/*.exe --clobber
