name: Production Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  linux:
    name: Linux artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            ffmpeg \
            file \
            libfuse2 \
            libssl-dev \
            protobuf-compiler \
            wget

          protoc --version
          ffmpeg -version

          curl -L -o "$RUNNER_TEMP/appimagetool" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool"

          echo "APPIMAGETOOL=$RUNNER_TEMP/appimagetool" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux Electron AppImages
        run: pnpm export:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: shindentoanilist-linux
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/electron-builder/*.AppImage

  windows-native:
    name: Windows Tauri executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install protoc ffmpeg --no-progress -y

          protoc --version
          ffmpeg -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Windows executable
        run: pnpm bundle:tauri:windows

      - name: Upload Tauri Windows native executable
        uses: actions/upload-artifact@v6
        with:
          name: shindentoanilist-windows-tauri
          if-no-files-found: error
          path: dist/tauri-windows/*.exe
