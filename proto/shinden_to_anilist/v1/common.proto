syntax = "proto3";

package shinden_to_anilist.v1;

message Date {
  int32 year = 1;
  uint32 month = 2;
  uint32 day = 3;
}

enum AnimeListSortedBy {
  ANIME_LIST_SORTED_BY_UNSPECIFIED = 0;

  ANIME_LIST_SORTED_BY_URGENCY = 1;
}

enum AnimeListFilter {
  ANIME_LIST_FILTER_UNSPECIFIED = 0;

  ANIME_LIST_FILTER_MATCHED = 1;
  ANIME_LIST_FILTER_AMBIGUOUS = 2;
  ANIME_LIST_FILTER_NOTMATCHED = 3;
}

enum AnimeType {
  ANIME_TYPE_UNSPECIFIED = 0;
  ANIME_TYPE_TV = 1;
  ANIME_TYPE_MOVIE = 2;
  ANIME_TYPE_OVA = 3;
  ANIME_TYPE_ONA = 4;
  ANIME_TYPE_SPECIAL = 5;
  ANIME_TYPE_UNKNOWN = 6;
}

enum AnimeStatus {
  ANIME_STATUS_UNSPECIFIED = 0;

  ANIME_STATUS_FINISHED = 1;
  ANIME_STATUS_ONGOING = 2;
  ANIME_STATUS_UPCOMING = 3;
  ANIME_STATUS_UNKNOWN = 4;
}

enum WatchStatus {
  WATCH_STATUS_UNSPECIFIED = 0;

  WATCH_STATUS_DROPPED = 1;
  WATCH_STATUS_COMPLETED = 2;
  WATCH_STATUS_WATCHING = 3;
  WATCH_STATUS_ON_HOLD = 4;
  WATCH_STATUS_PLAN_TO_WATCH = 5;
}

enum Season {
  SEASON_UNSPECIFIED = 0;

  SEASON_WINTER = 1;
  SEASON_SPRING = 2;
  SEASON_SUMMER = 3;
  SEASON_FALL = 4;
  SEASON_UNKNOWN = 5;
}

enum SourceProvider {
  SOURCE_PROVIDER_UNSPECIFIED = 0;

  SOURCE_PROVIDER_SHINDEN = 1;
  SOURCE_PROVIDER_ANIME_ZONE = 2;
  SOURCE_PROVIDER_OGLADAJ_ANIME = 3;
}
