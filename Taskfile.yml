version: "3"

vars:
  APP_NAME: "ShindenToAnilist"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "pnpm"}}'
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  crates:build:
    label: crates:build (DEV={{.DEV}} TARGET={{.TARGET}})
    summary: Builds the Rust crates and regenerates the driver cgo bindings
    deps:
      - task: generate:stadriver:bindings
    cmds:
      - cargo build {{if .TARGET}}--target {{.TARGET}}{{end}} {{if ne .DEV "true"}}--release{{end}}
    vars:
      DEV: '{{.DEV | default "false"}}'
      TARGET: '{{.TARGET | default ""}}'

  generate:stadriver:bindings:
    summary: Regenerates internal stadriver cgo bindings
    dir: crates/shinden-to-anilist-driver
    preconditions:
      - sh: cbindgen --version
        msg: "cbindgen is required. Install it with: cargo install cbindgen"
    cmds:
      - cbindgen --config cbindgen.toml --output include/shinden_to_anilist_driver.h

  setup:docker:
    summary: Builds Docker image for Linux/Windows cross-compilation
    cmds:
      - task: common:setup:docker
